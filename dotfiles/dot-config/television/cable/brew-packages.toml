[metadata]
name = "brew-packages"
description = "List and manage Homebrew packages"
requirements = ["brew"]

[source]
command = [
    "brew list --formula",
    "brew list --cask",
]

[preview]
command = "brew info '{}'"

[ui]
layout = "portrait"

[keybindings]
ctrl-u = "actions:upgrade"

[actions.upgrade]
description = "Upgrade the selected package"
command = "brew upgrade '{}'"
mode = "execute"

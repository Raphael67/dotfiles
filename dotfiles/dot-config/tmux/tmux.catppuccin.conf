# ~/.tmux.conf

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# Force rounded status indicators and add some spacing
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"
# Round the current window indicator
set -g @catppuccin_window_current_left_separator "#[fg=#{@_ctp_status_bg},reverse]#[none]"
set -g @catppuccin_window_current_right_separator "#[fg=#{@_ctp_status_bg},reverse]#[none]"
# Use pane_title for window text so Claude Code agent names (e.g. "✳ router") show correctly.
# Claude Code sets the terminal title (OSC 0) to the agent/project name, which tmux captures
# as pane_title. Without this, automatic-rename uses the process name ("2.1.119" — the Claude
# binary filename) instead of the meaningful agent name.
set -g @catppuccin_window_text " #{?pane_title,#{pane_title},#{pane_current_command}}"
# Replace zoom indicator (Z) with a magnifying glass
set -g @catppuccin_window_current_text "#{?pane_title,#{pane_title},#{pane_current_command}}#{?window_zoomed_flag,(),}"
# Set the window number to be on the right
set -g @catppuccin_window_number_position "right"

# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux
set -gF status-bg "#{@thm_bg}"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g @catppuccin_session_text " #S"
set -g status-left "#{E:@catppuccin_status_session}"
# set -g status-left "#{E:@catppuccin_status_application}"

set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_network}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{?#{battery_status},#{E:@catppuccin_status_battery},}"

# Claude model + tmux version module (shown on right side of status bar)
# Format: " <model> (<agent>) tmux <version>"
# The claude-info.sh script reads ~/.claude/tmux-model-info written by the SessionStart hook.
set -ag status-right "#[fg=#{@thm_lavender},bg=#{@thm_surface_1},bold]#(~/.config/tmux/scripts/claude-info.sh)#[nobold] #[fg=#{@thm_overlay_2}]tmux #{version}#[fg=#{@thm_surface_1},reverse]"

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux
# Or, if using TPM, just run TPM
